# Local ruff config for this single-file stdlib CLI. Keeps the global
# `select = ALL`, ignoring only the two rules ruff itself says conflict with its
# formatter. Everything else is fixed in the code, not silenced; the assert-based
# --selftest carries per-line `# noqa: S101`, and the stdlib urlopen calls carry
# per-line `# noqa: S310` (hardcoded-https, audited).
line-length = 88

[lint]
select = ["ALL"]
ignore = [
    "COM812",  # trailing comma — conflicts with the ruff formatter
    "ISC001",  # implicit string concat — conflicts with the ruff formatter
]

[lint.pydocstyle]
convention = "pep257"
